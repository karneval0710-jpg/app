<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>資金漂白生技公司</title>
<style>
:root{
  --bg:#f7f4ef; --card:#fffdf9; --text:#2b2926; --muted:#8d867c; --line:#ece4d8;
  --primary:#9eb7aa; --primary-2:#d8e6df; --pink:#e8b7b7; --pink-2:#f6e3e1;
  --blue:#a8bdcf; --blue-2:#e5edf3; --lav:#c5bdd7; --lav-2:#ebe7f3;
  --yellow:#e4d39b; --yellow-2:#f6efcf; --green:#aac9b8; --green-2:#e4f0e9;
  --danger:#c8847c; --shadow:0 10px 28px rgba(83,68,53,.08); --radius:22px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{height:100%} body{margin:0;background:linear-gradient(180deg,#faf7f2 0%,#f3eee7 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif} 
.app{max-width:460px;margin:0 auto;min-height:100vh;padding:18px 16px 92px}.top{position:sticky;top:0;z-index:5;margin:0 -16px 10px;padding:12px 16px 10px;background:rgba(247,244,239,.88);backdrop-filter:blur(18px)}
.title{font-weight:800;font-size:22px;letter-spacing:.3px}.month-pill{margin-top:10px;display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:9px 13px;box-shadow:var(--shadow);font-size:14px;color:#5f594f}.month-pill button{border:0;background:transparent;font-size:17px;color:var(--muted);padding:0 4px}.page{display:none}.page.active{display:block}.card{background:rgba(255,253,249,.95);border:1px solid rgba(236,228,216,.85);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin:12px 0}.section-title{font-size:13px;font-weight:700;color:var(--muted);margin:2px 0 12px}.muted{color:var(--muted);font-size:13px}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.input,select,textarea{width:100%;border:1px solid var(--line);background:#fffaf2;border-radius:16px;padding:12px 13px;font-size:15px;color:var(--text);outline:none} textarea{resize:vertical;min-height:54px}.amount{font-size:42px;font-weight:800;border:0;background:transparent;padding:4px 0;width:100%}.amount-wrap{display:flex;align-items:center;gap:8px}.currency{font-size:22px;color:var(--muted);font-weight:700}.seg{display:flex;background:#eee7dc;border-radius:18px;padding:4px;gap:4px}.seg button{flex:1;border:0;background:transparent;border-radius:14px;padding:10px;font-weight:700;color:var(--muted)}.seg button.active{background:var(--card);color:var(--text);box-shadow:0 2px 10px rgba(80,60,40,.08)}.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}.chips.wrap{flex-wrap:wrap;overflow:visible}.chip{border:0;background:#f0ebe2;color:#665f55;border-radius:999px;padding:9px 13px;font-weight:650;font-size:14px;white-space:nowrap}.chip.active{background:var(--primary-2);color:#415d51;box-shadow:inset 0 0 0 1px #bbd0c4}.chip.small{font-size:12px;padding:7px 10px}.btn{width:100%;border:0;border-radius:18px;padding:14px 16px;background:var(--primary);color:white;font-weight:800;font-size:16px;box-shadow:0 10px 22px rgba(102,133,118,.22)}.btn.soft{background:var(--primary-2);color:#49645a;box-shadow:none}.btn.danger{background:var(--pink-2);color:#9d5f58;box-shadow:none}.btn.inline{width:auto;padding:9px 12px;font-size:13px}.list-item{padding:13px 0;border-bottom:1px solid #f0e8dd}.list-item:last-child{border-bottom:0}.amount-pos{color:#6c9b7c;font-weight:800}.amount-neg{color:#bf746d;font-weight:800}.subline{font-size:12px;color:var(--muted);margin-top:4px}.bottom-nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(460px,100%);background:rgba(255,253,249,.92);backdrop-filter:blur(18px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);padding:7px 6px max(7px,env(safe-area-inset-bottom));z-index:10}.navbtn{border:0;background:transparent;border-radius:16px;padding:8px 2px;color:var(--muted);font-size:11px;font-weight:700}.navbtn.active{background:var(--primary-2);color:#435d52}.donut-wrap{display:grid;place-items:center;padding:8px 0 12px}.donut{width:210px;height:210px;border-radius:50%;position:relative;background:conic-gradient(var(--green) 0 35%,var(--pink) 35% 58%,var(--blue) 58% 78%,var(--lav) 78% 91%,var(--yellow) 91% 100%)}.donut:after{content:"";position:absolute;inset:48px;background:var(--card);border-radius:50%;box-shadow:inset 0 0 0 1px var(--line)}.donut-center{position:absolute;text-align:center;z-index:1}.donut-total{font-size:18px;font-weight:800}.stat-row{padding:13px 0;border-bottom:1px solid #f0e8dd}.bar{height:7px;background:#f1ece4;border-radius:999px;overflow:hidden;margin-top:8px}.bar span{display:block;height:100%;border-radius:999px;background:var(--primary)}.substat{padding:10px 0 0 16px}.modal{position:fixed;inset:0;background:rgba(45,39,33,.25);display:none;z-index:30;align-items:flex-end}.modal.show{display:flex}.sheet{width:100%;max-width:460px;margin:0 auto;background:var(--card);border-radius:26px 26px 0 0;padding:18px 16px 22px;box-shadow:0 -14px 40px rgba(60,45,30,.18)}.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.month-cell{border:0;border-radius:16px;background:#f1ece4;padding:13px 0;font-weight:750;color:#5f594f}.month-cell.active{background:var(--primary-2);color:#405d51}.tabs-mini{display:flex;gap:8px;margin:10px 0}.tabs-mini button{border:0;border-radius:999px;background:#eee8de;color:var(--muted);padding:8px 12px;font-weight:700}.tabs-mini button.active{background:var(--primary-2);color:#405d51}.edit-actions{display:flex;gap:8px}.hidden{display:none!important}.color-dot{width:10px;height:10px;border-radius:50%;background:var(--primary);display:inline-block;margin-right:8px}.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#403b35;color:white;border-radius:999px;padding:10px 16px;font-size:14px;opacity:0;transition:.2s;z-index:50}.toast.show{opacity:1}.empty{text-align:center;color:var(--muted);padding:28px 0;font-size:14px}.account-card{background:#fffaf2;border:1px solid var(--line);border-radius:18px;padding:13px;margin:8px 0}.drag{color:#bbb;margin-right:6px}.setting-item input{margin-top:8px}.small-actions button{border:0;background:transparent;color:var(--muted);font-weight:700;margin-left:8px}.small-actions .danger-t{color:#b8756d}
</style>
</head>
<body><div class="app">
  <div class="top"><div class="title">資金漂白生技公司</div><div class="month-pill"><button onclick="shiftMonth(-1)">‹</button><span onclick="openMonthPicker()" id="monthLabel">2026年4月</span><button onclick="shiftMonth(1)">›</button></div></div>
  <main id="page-add" class="page active"></main><main id="page-records" class="page"></main><main id="page-stats" class="page"></main><main id="page-assets" class="page"></main><main id="page-settings" class="page"></main>
</div>
<nav class="bottom-nav"><button class="navbtn active" onclick="showPage('add')">記帳</button><button class="navbtn" onclick="showPage('records')">紀錄</button><button class="navbtn" onclick="showPage('stats')">統計</button><button class="navbtn" onclick="showPage('assets')">總資產</button><button class="navbtn" onclick="showPage('settings')">設定</button></nav>
<div class="modal" id="monthModal" onclick="if(event.target.id==='monthModal')closeMonthPicker()"><div class="sheet"><div class="row"><b>選擇月份</b><button class="chip" onclick="closeMonthPicker()">完成</button></div><div class="row" style="margin:14px 0"><button class="chip" onclick="year-- ; renderMonthPicker()">‹</button><b id="pickerYear"></b><button class="chip" onclick="year++ ; renderMonthPicker()">›</button></div><div class="month-grid" id="monthGrid"></div></div></div>
<div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id); const money=n=>'NT$'+Math.round(n||0).toLocaleString(); const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const colors=['#aac9b8','#e8b7b7','#a8bdcf','#c5bdd7','#e4d39b','#d7b9a6','#b8c7a5','#d6c0cf'];
const defaults={records:[],transfers:[],debts:[],categories:[{id:'e1',type:'expense',name:'吃喝',order:1,color:colors[0],subs:[{id:'e1s1',name:'早餐',order:1},{id:'e1s2',name:'午餐',order:2},{id:'e1s3',name:'晚餐',order:3},{id:'e1s4',name:'宵夜',order:4},{id:'e1s5',name:'飲料',order:5},{id:'e1s6',name:'點心',order:6},{id:'e1s7',name:'食材',order:7},{id:'e1s8',name:'水果',order:8},{id:'e1s9',name:'酒',order:9},{id:'e1s10',name:'煙',order:10}]},{id:'e2',type:'expense',name:'交通',order:2,color:colors[1],subs:[{id:'e2s1',name:'加油',order:1},{id:'e2s2',name:'eTag',order:2},{id:'e2s3',name:'停車',order:3},{id:'e2s4',name:'捷運',order:4},{id:'e2s5',name:'公車',order:5},{id:'e2s6',name:'火車',order:6},{id:'e2s7',name:'計程車',order:7},{id:'e2s8',name:'保養',order:8},{id:'e2s9',name:'維修',order:9}]},{id:'e3',type:'expense',name:'生活',order:3,color:colors[2],subs:[{id:'e3s1',name:'清潔',order:1},{id:'e3s2',name:'3C用品',order:2},{id:'e3s3',name:'洗漱',order:3},{id:'e3s4',name:'廚房',order:4},{id:'e3s5',name:'服飾',order:5},{id:'e3s6',name:'寢具',order:6},{id:'e3s7',name:'裝飾',order:7}]},{id:'e4',type:'expense',name:'醫療',order:4,color:colors[3],subs:[{id:'e4s1',name:'掛號',order:1},{id:'e4s2',name:'藥-吃',order:2},{id:'e4s3',name:'藥-擦',order:3},{id:'e4s4',name:'預防針',order:4},{id:'e4s5',name:'其他',order:5}]},{id:'e5',type:'expense',name:'教育',order:5,color:colors[4],subs:[{id:'e5s1',name:'補習',order:1},{id:'e5s2',name:'書籍',order:2},{id:'e5s3',name:'課程',order:3},{id:'e5s4',name:'軟體',order:4}]},{id:'e6',type:'expense',name:'娛樂',order:6,color:colors[5],subs:[{id:'e6s1',name:'玩具',order:1},{id:'e6s2',name:'遊戲',order:2},{id:'e6s3',name:'門票',order:3},{id:'e6s4',name:'會員',order:4}]},{id:'e7',type:'expense',name:'固定',order:7,color:colors[6],subs:[{id:'e7s1',name:'管理費',order:1},{id:'e7s2',name:'電費',order:2},{id:'e7s3',name:'水費',order:3},{id:'e7s4',name:'瓦斯',order:4},{id:'e7s5',name:'網路',order:5},{id:'e7s6',name:'貸款',order:6},{id:'e7s7',name:'租金',order:7},{id:'e7s8',name:'保險',order:8}]},{id:'e8',type:'expense',name:'其他',order:8,color:colors[7],subs:[{id:'e8s1',name:'紅包',order:1},{id:'e8s2',name:'送禮',order:2},{id:'e8s3',name:'還',order:3},{id:'e8s4',name:'其他',order:4}]},{id:'e9',type:'expense',name:'代購',order:9,color:colors[0],subs:[{id:'e9s1',name:'商品',order:1},{id:'e9s2',name:'手續費',order:2},{id:'e9s3',name:'運費',order:3},{id:'e9s4',name:'儲值',order:4}]},{id:'e10',type:'expense',name:'寵物',order:10,color:colors[1],subs:[{id:'e10s1',name:'飼料',order:1},{id:'e10s2',name:'貓砂',order:2}]},{id:'e11',type:'expense',name:'回饋',order:11,color:colors[2],subs:[{id:'e11s1',name:'優惠',order:1}]},{id:'e12',type:'expense',name:'家電',order:12,color:colors[3],subs:[{id:'e12s1',name:'大家電',order:1},{id:'e12s2',name:'小家電',order:2},{id:'e12s3',name:'傢俱',order:3}]},{id:'i1',type:'income',name:'正職',order:1,color:colors[0],subs:[{id:'i1s1',name:'薪資',order:1},{id:'i1s2',name:'油資',order:2},{id:'i1s3',name:'獎金',order:3},{id:'i1s4',name:'年終',order:4}]},{id:'i2',type:'income',name:'兼職',order:2,color:colors[1],subs:[{id:'i2s1',name:'蝦皮',order:1},{id:'i2s2',name:'兼職',order:2},{id:'i2s3',name:'紅包',order:3}]},{id:'i3',type:'income',name:'投資',order:3,color:colors[2],subs:[{id:'i3s1',name:'利息',order:1}]},{id:'i4',type:'income',name:'額外',order:4,color:colors[3],subs:[{id:'i4s1',name:'紅包',order:1},{id:'i4s2',name:'退費',order:2},{id:'i4s3',name:'媽',order:3},{id:'i4s4',name:'爸',order:4},{id:'i4s5',name:'其他',order:5}]}],members:[{id:'m1',name:'聆',order:1},{id:'m2',name:'皮皮',order:2},{id:'m3',name:'蹦蹦',order:3},{id:'m4',name:'跳跳',order:4},{id:'m5',name:'妹妹',order:5},{id:'m6',name:'家',order:6}],accounts:[{id:'a1',name:'現金',type:'現金',initialBalance:0,order:1,include:true},{id:'a2',name:'台新黑狗',type:'信用卡',initialBalance:0,order:2,include:true},{id:'a3',name:'台新R',type:'信用卡',initialBalance:0,order:3,include:true},{id:'a4',name:'街口',type:'電子支付',initialBalance:0,order:4,include:true},{id:'a5',name:'中信',type:'銀行',initialBalance:0,order:5,include:true},{id:'a6',name:'悠遊卡',type:'電子支付',initialBalance:0,order:6,include:true}]};
const clone=o=>JSON.parse(JSON.stringify(o));
function loadState(){try{return JSON.parse(localStorage.getItem('zjpbc_morandi_v2'))||JSON.parse(localStorage.getItem('zjpbc'))||clone(defaults)}catch(e){return clone(defaults)}}
let state=loadState(); migrateDefaults(); let page='add', type='expense', cat='', sub='', member='m1', account='a1', payer='m1', editing=null, year=new Date().getFullYear(), month=new Date().getMonth(); let statMode='category', assetDetail=null;

function migrateDefaults(){
  state.records=state.records||[]; state.transfers=state.transfers||[]; state.debts=state.debts||[];
  state.categories=state.categories||[]; state.members=state.members||[]; state.accounts=state.accounts||[];
  defaults.categories.forEach(dc=>{
    let c=state.categories.find(x=>x.type===dc.type && x.name===dc.name);
    if(!c){state.categories.push(clone(dc)); return;}
    c.order = c.order || dc.order; c.color = c.color || dc.color; c.subs = c.subs || [];
    dc.subs.forEach(ds=>{ if(!c.subs.find(s=>s.name===ds.name)) c.subs.push(clone(ds)); });
    c.subs.forEach((s,i)=>{ if(!s.order) s.order=i+1; });
  });
  defaults.members.forEach(dm=>{ if(!state.members.find(x=>x.name===dm.name)) state.members.push(clone(dm)); });
  defaults.accounts.forEach(da=>{ if(!state.accounts.find(x=>x.name===da.name)) state.accounts.push(clone(da)); });
  state.members.forEach((m,i)=>{ if(!m.order) m.order=i+1; });
  state.accounts.forEach((a,i)=>{ if(!a.order) a.order=i+1; if(a.include===undefined)a.include=true; });
  save();
}
function save(){localStorage.setItem('zjpbc_morandi_v2', JSON.stringify(state))} function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1500)}
function cats(){return state.categories.filter(c=>c.type===type).sort((a,b)=>a.order-b.order)} function members(){return state.members.sort((a,b)=>a.order-b.order)} function accounts(){return state.accounts.sort((a,b)=>a.order-b.order)} function nameOf(arr,id){return (arr.find(x=>x.id===id)||{}).name||'—'}
function monthRecords(){return state.records.filter(r=>r.year===year&&r.month===month)} function monthTransfers(){return state.transfers.filter(r=>r.year===year&&r.month===month)}
function updateMonthLabel(){$('monthLabel').textContent=`${year}年${month+1}月`} function shiftMonth(n){month+=n;if(month<0){month=11;year--} if(month>11){month=0;year++} updateMonthLabel();render()} function openMonthPicker(){$('monthModal').classList.add('show');renderMonthPicker()} function closeMonthPicker(){$('monthModal').classList.remove('show')} function renderMonthPicker(){$('pickerYear').textContent=year; $('monthGrid').innerHTML=Array.from({length:12},(_,i)=>`<button class="month-cell ${i===month?'active':''}" onclick="month=${i};closeMonthPicker();updateMonthLabel();render()">${i+1}月</button>`).join('')}
function showPage(p){page=p;document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));$('page-'+p).classList.add('active');document.querySelectorAll('.navbtn').forEach((b,i)=>b.classList.toggle('active',['add','records','stats','assets','settings'][i]===p));render()}
function render(){updateMonthLabel(); if(page==='add')renderAdd(); if(page==='records')renderRecords(); if(page==='stats')renderStats(); if(page==='assets')renderAssets(); if(page==='settings')renderSettings();}
function renderAdd(){if(!cat){cat=cats()[0]?.id||'';sub=(cats()[0]?.subs||[])[0]?.id||''}$('page-add').innerHTML=`<div class="card"><div class="seg"><button class="${type==='expense'?'active':''}" onclick="type='expense';cat='';sub='';renderAdd()">支出</button><button class="${type==='income'?'active':''}" onclick="type='income';cat='';sub='';renderAdd()">收入</button></div><div class="amount-wrap"><span class="currency">NT$</span><input id="amount" class="amount" type="number" inputmode="decimal" placeholder="0"></div><input id="date" class="input" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div class="card"><div class="section-title">分類</div><div class="chips wrap">${cats().map(c=>`<button class="chip ${cat===c.id?'active':''}" onclick="cat='${c.id}';sub='${(c.subs||[])[0]?.id||''}';renderAdd()">${c.name}</button>`).join('')}</div><div class="section-title" style="margin-top:14px">子分類</div><div class="chips wrap">${((state.categories.find(c=>c.id===cat)||{}).subs||[]).sort((a,b)=>a.order-b.order).map(s=>`<button class="chip small ${sub===s.id?'active':''}" onclick="sub='${s.id}';renderAdd()">${s.name}</button>`).join('')}</div></div><div class="card"><div class="section-title">消費成員</div><div class="chips">${members().map(m=>`<button class="chip ${member===m.id?'active':''}" onclick="member='${m.id}';renderAdd()">${m.name}</button>`).join('')}</div><div class="section-title" style="margin-top:14px">付款工具 / 帳戶</div><div class="chips">${accounts().map(a=>`<button class="chip ${account===a.id?'active':''}" onclick="account='${a.id}';renderAdd()">${a.name}</button>`).join('')}</div><div class="section-title" style="margin-top:14px">付款人</div><div class="chips">${members().map(m=>`<button class="chip ${payer===m.id?'active':''}" onclick="payer='${m.id}';renderAdd()">${m.name}</button>`).join('')}</div><textarea id="note" class="input" placeholder="備註（可略）" style="margin-top:14px"></textarea></div><button class="btn" onclick="saveRecord()">儲存</button>`; if(editing){const r=state.records.find(x=>x.id===editing); if(r){$('amount').value=r.amount;$('date').value=r.date;$('note').value=r.note||''}}}
function saveRecord(){let amount=parseFloat($('amount').value); if(!amount)return toast('請輸入金額'); let d=new Date($('date').value||new Date()); let rec={id:editing||uid(),type,amount,date:$('date').value,year:d.getFullYear(),month:d.getMonth(),cat,sub,member,account,payer,note:$('note').value,timestamp:Date.now()}; if(editing){state.records=state.records.map(r=>r.id===editing?rec:r);editing=null}else state.records.unshift(rec); save(); toast('已儲存'); showPage('records')}
function recordLine(r){let c=state.categories.find(x=>x.id===r.cat), s=(c?.subs||[]).find(x=>x.id===r.sub); return `<div class="list-item" onclick="editRec('${r.id}')"><div class="row"><div><b>${c?.name||'—'}${s?' / '+s.name:''}</b><div class="subline">${r.date} · ${nameOf(state.members,r.member)} · ${nameOf(state.accounts,r.account)} · ${nameOf(state.members,r.payer)}${r.note?' · '+r.note:''}</div></div><div class="${r.type==='income'?'amount-pos':'amount-neg'}">${r.type==='income'?'+':'-'}${money(r.amount)}</div></div></div>`}
function renderRecords(){let list=monthRecords(); $('page-records').innerHTML=`<div class="card"><input id="q" class="input" placeholder="搜尋分類、成員、帳戶、備註" oninput="renderRecordList()"><div class="grid2" style="margin-top:10px"><select id="ftype" onchange="renderRecordList()"><option value="">全部類型</option><option value="expense">支出</option><option value="income">收入</option></select><select id="facc" onchange="renderRecordList()"><option value="">全部帳戶</option>${accounts().map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select></div></div><div class="card" id="recordList"></div>`;renderRecordList()}
function renderRecordList(){let q=($('q')?.value||'').toLowerCase(), ft=$('ftype')?.value||'', fa=$('facc')?.value||'';let list=monthRecords().filter(r=>{let c=state.categories.find(x=>x.id===r.cat), s=(c?.subs||[]).find(x=>x.id===r.sub);let text=[c?.name,s?.name,nameOf(state.members,r.member),nameOf(state.accounts,r.account),nameOf(state.members,r.payer),r.note].join(' ').toLowerCase();return (!q||text.includes(q))&&(!ft||r.type===ft)&&(!fa||r.account===fa)});$('recordList').innerHTML=list.length?list.map(recordLine).join(''):'<div class="empty">這個月份還沒有紀錄</div>'}
function editRec(id){let r=state.records.find(x=>x.id===id); Object.assign(window,{type:r.type,cat:r.cat,sub:r.sub,member:r.member,account:r.account,payer:r.payer}); editing=id; showPage('add')}
function renderStats(){let data=monthRecords().filter(r=>r.type==='expense'); let total=data.reduce((s,r)=>s+r.amount,0); let groups={}; data.forEach(r=>{let key= statMode==='category'?r.cat:statMode==='member'?r.member:statMode==='account'?r.account:r.payer; if(!groups[key])groups[key]={total:0,subs:{},color:colors[Object.keys(groups).length%colors.length]};groups[key].total+=r.amount;if(statMode==='category'){let c=state.categories.find(x=>x.id===r.cat), ss=(c?.subs||[]).find(x=>x.id===r.sub)?.name||'未分類';groups[key].subs[ss]=(groups[key].subs[ss]||0)+r.amount}});let entries=Object.entries(groups).sort((a,b)=>b[1].total-a[1].total);let conic='';let acc=0;entries.forEach(([k,g],i)=>{let p=total?g.total/total*100:0;conic+=`${g.color} ${acc}% ${acc+p}%,`;acc+=p});function label(k){if(statMode==='category')return state.categories.find(x=>x.id===k)?.name||'—'; if(statMode==='member'||statMode==='payer')return nameOf(state.members,k); return nameOf(state.accounts,k)}$('page-stats').innerHTML=`<div class="tabs-mini"><button class="${statMode==='category'?'active':''}" onclick="statMode='category';renderStats()">分類</button><button class="${statMode==='member'?'active':''}" onclick="statMode='member';renderStats()">成員</button><button class="${statMode==='account'?'active':''}" onclick="statMode='account';renderStats()">帳戶</button><button class="${statMode==='payer'?'active':''}" onclick="statMode='payer';renderStats()">付款人</button></div><div class="card"><div class="donut-wrap"><div class="donut" style="background:${total?`conic-gradient(${conic.slice(0,-1)})`:'#eee8de'}"><div class="donut-center"><div class="muted">本月支出</div><div class="donut-total">${money(total)}</div></div></div></div></div><div class="card">${entries.length?entries.map(([k,g])=>{let p=total?g.total/total*100:0;return `<div class="stat-row"><div class="row"><div><span class="color-dot" style="background:${g.color}"></span><b>${label(k)}</b> <span class="muted">${p.toFixed(1)}%</span></div><div class="amount-neg">-${money(g.total)}</div></div><div class="bar"><span style="width:${p}%;background:${g.color}"></span></div>${statMode==='category'?Object.entries(g.subs).sort((a,b)=>b[1]-a[1]).map(([s,a])=>`<div class="substat"><div class="row"><span class="muted">${s} ${(a/g.total*100).toFixed(1)}%</span><span class="muted">-${money(a)}</span></div><div class="bar"><span style="width:${a/g.total*100}%;background:${g.color}"></span></div></div>`).join(''):''}</div>`}).join(''):'<div class="empty">沒有支出資料</div>'}</div>`}
function balanceOf(id){let a=state.accounts.find(x=>x.id===id), bal=+(a?.initialBalance||0); state.records.forEach(r=>{if(r.account===id)bal+=r.type==='income'?r.amount:-r.amount});state.transfers.forEach(t=>{if(t.from===id)bal-=t.amount;if(t.to===id)bal+=t.amount});state.debts.forEach(d=>{if(d.account===id)bal+=d.kind==='borrowIn'?d.amount:-d.amount});return bal}
function renderAssets(){if(assetDetail)return renderAccountDetail(assetDetail);let total=accounts().filter(a=>a.include).reduce((s,a)=>s+balanceOf(a.id),0);$('page-assets').innerHTML=`<div class="card"><div class="muted">總資產</div><div style="font-size:32px;font-weight:900;margin-top:4px">${money(total)}</div></div><div class="card"><div class="section-title">帳戶總覽</div>${accounts().map(a=>`<div class="account-card" onclick="assetDetail='${a.id}';renderAssets()"><div class="row"><div><b>${a.name}</b><div class="subline">${a.type}</div></div><b>${money(balanceOf(a.id))}</b></div></div>`).join('')}</div><div class="card"><div class="section-title">轉帳</div><div class="grid2"><select id="from">${accounts().map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select><select id="to">${accounts().map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select></div><input id="tamt" class="input" type="number" placeholder="金額" style="margin-top:10px"><input id="tdate" class="input" type="date" value="${new Date().toISOString().slice(0,10)}" style="margin-top:10px"><input id="tnote" class="input" placeholder="備註" style="margin-top:10px"><button class="btn soft" style="margin-top:10px" onclick="saveTransfer()">儲存轉帳</button></div><div class="card"><div class="section-title">借貸</div><div class="grid2"><button class="btn soft" onclick="saveDebt('borrowIn')">新增借入</button><button class="btn soft" onclick="saveDebt('lendOut')">新增借出</button></div><div class="empty">借貸會影響帳戶餘額，但不算收入或支出。</div></div>`}
function saveTransfer(){let amount=parseFloat($('tamt').value); if(!amount)return toast('請輸入金額'); let d=new Date($('tdate').value);state.transfers.unshift({id:uid(),from:$('from').value,to:$('to').value,amount,date:$('tdate').value,year:d.getFullYear(),month:d.getMonth(),note:$('tnote').value});save();toast('已儲存轉帳');renderAssets()}
function saveDebt(kind){let amount=prompt(kind==='borrowIn'?'借入金額':'借出金額'); if(!amount)return; let who=prompt('對象'); let acc=account; state.debts.unshift({id:uid(),kind,person:who,amount:+amount,date:new Date().toISOString().slice(0,10),account:acc,status:'open'});save();renderAssets()}
function renderAccountDetail(id){let a=state.accounts.find(x=>x.id===id);let items=[];state.records.filter(r=>r.account===id&&r.year===year&&r.month===month).forEach(r=>items.push({date:r.date,html:recordLine(r)}));state.transfers.filter(t=>(t.from===id||t.to===id)&&t.year===year&&t.month===month).forEach(t=>items.push({date:t.date,html:`<div class="list-item"><div class="row"><div><b>轉帳</b><div class="subline">${t.date} · ${nameOf(state.accounts,t.from)} → ${nameOf(state.accounts,t.to)}${t.note?' · '+t.note:''}</div></div><div class="${t.to===id?'amount-pos':'amount-neg'}">${t.to===id?'+':'-'}${money(t.amount)}</div></div></div>`}));$('page-assets').innerHTML=`<button class="chip" onclick="assetDetail=null;renderAssets()">‹ 返回總資產</button><div class="card"><div class="muted">${a.name}</div><div style="font-size:30px;font-weight:900">${money(balanceOf(id))}</div><div class="subline">${a.type} · 點月份可切換明細</div></div><div class="card">${items.length?items.sort((a,b)=>b.date.localeCompare(a.date)).map(x=>x.html).join(''):'<div class="empty">本月沒有明細</div>'}</div>`}
function renderSettings(){$('page-settings').innerHTML=`<div class="card"><div class="section-title">分類管理</div>${state.categories.sort((a,b)=>a.type.localeCompare(b.type)||a.order-b.order).map(c=>`<div class="list-item setting-item"><div class="row"><b>${c.type==='expense'?'支出':'收入'} · ${c.name}</b><span class="small-actions"><button onclick="moveCat('${c.id}',-1)">上移</button><button onclick="renameCat('${c.id}')">修改</button><button class="danger-t" onclick="delCat('${c.id}')">刪除</button></span></div><div class="subline">子分類：${(c.subs||[]).map(s=>s.name).join('、')}</div><button class="chip small" onclick="addSub('${c.id}')">+ 子分類</button></div>`).join('')}<button class="btn soft" onclick="addCat()">新增分類</button></div><div class="card"><div class="section-title">成員管理</div>${members().map(m=>`<div class="list-item row"><b>${m.name}</b><span class="small-actions"><button onclick="moveItem('members','${m.id}',-1)">上移</button><button onclick="renameItem('members','${m.id}')">修改</button><button class="danger-t" onclick="delItem('members','${m.id}')">刪除</button></span></div>`).join('')}<button class="btn soft" onclick="addItem('members','成員名稱')">新增成員</button></div><div class="card"><div class="section-title">帳戶管理</div>${accounts().map(a=>`<div class="list-item row"><div><b>${a.name}</b><div class="subline">${a.type} · 初始 ${money(a.initialBalance)}</div></div><span class="small-actions"><button onclick="moveItem('accounts','${a.id}',-1)">上移</button><button onclick="renameItem('accounts','${a.id}')">修改</button><button class="danger-t" onclick="delItem('accounts','${a.id}')">刪除</button></span></div>`).join('')}<button class="btn soft" onclick="addAccount()">新增帳戶</button></div>`}
function addCat(){let name=prompt('分類名稱');if(!name)return;let t=confirm('按確定=支出分類，取消=收入分類')?'expense':'income';state.categories.push({id:uid(),type:t,name,order:99,color:colors[state.categories.length%colors.length],subs:[]});save();renderSettings()}function renameCat(id){let c=state.categories.find(x=>x.id===id),n=prompt('新名稱',c.name);if(n)c.name=n;save();renderSettings()}function delCat(id){if(confirm('刪除分類？'))state.categories=state.categories.filter(x=>x.id!==id);save();renderSettings()}function addSub(id){let c=state.categories.find(x=>x.id===id),n=prompt('子分類名稱');if(n)c.subs.push({id:uid(),name:n,order:99});save();renderSettings()}function moveCat(id,d){let c=state.categories.find(x=>x.id===id);c.order+=d*1.5;state.categories.sort((a,b)=>a.order-b.order).forEach((x,i)=>x.order=i+1);save();renderSettings()}
function addItem(key,label){let name=prompt(label);if(!name)return;state[key].push({id:uid(),name,order:99});save();renderSettings()}function renameItem(key,id){let x=state[key].find(i=>i.id===id),n=prompt('新名稱',x.name);if(n)x.name=n;save();renderSettings()}function delItem(key,id){if(confirm('刪除？'))state[key]=state[key].filter(i=>i.id!==id);save();renderSettings()}function moveItem(key,id,d){let x=state[key].find(i=>i.id===id);x.order+=d*1.5;state[key].sort((a,b)=>a.order-b.order).forEach((i,n)=>i.order=n+1);save();renderSettings()}function addAccount(){let name=prompt('帳戶名稱');if(!name)return;let type=prompt('類型：現金/銀行/信用卡/電子支付','銀行')||'銀行';let initial=+(prompt('初始金額','0')||0);state.accounts.push({id:uid(),name,type,initialBalance:initial,order:99,include:true});save();renderSettings()}
render();
</script></body></html>
